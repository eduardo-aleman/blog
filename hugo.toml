baseURL = 'https://blog.ealeman.com/'
title = 'Eduardo Alemán - Blog'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
enableSitemap = true
timeZone = 'America/Los_Angeles'

# Outputs configuration for RSS and other formats
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

# Site parameters
[params]
  description = 'Editorial writing in English and Spanish'
  author = 'Eduardo Alemán'
  defaultTheme = 'light'
  
  [params.social]
    twitter = ''
    mastodon = ''
    github = ''

# Languages configuration
[languages]

  [languages.en]
    label = 'English'
    locale = 'en-us'
    weight = 1
    contentDir = 'content/en'
    
    [languages.en.params]
      description = 'Editorial writing, essays, and translations'

  [languages.es]
    label = 'Español'
    locale = 'es'
    weight = 2
    contentDir = 'content/es'
    
    [languages.es.params]
      description = 'Escritura editorial, ensayos y traducciones'

# Markup settings
[markup]
  [markup.highlight]
    style = 'friendly'
    lineNos = false
  
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

# Pagination — 9 items per page across the homepage and all list pages.
# Hugo v0.128.0+ uses this block; the legacy top-level `paginate = N` is deprecated.
[pagination]
  pagerSize = 9

# Module configuration (for future Hugo Modules support)
[build]
  writeStats = true

# Security for Google Fonts
[security]
  [security.funcs]
    getenv = ['^HUGO_', '^PATH$']
