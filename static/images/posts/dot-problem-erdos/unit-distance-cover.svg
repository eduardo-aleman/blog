<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Unit distance problem — square grid versus algebraic construction</title>
  <desc>Two panels side by side. Left: the classical square grid construction for unit distances, shown in amber. Right: the new algebraic construction that surpasses it, shown in teal with denser connections.</desc>

  <defs>
    <style>
      .bg-left  { fill: #FAEEDA; }
      .bg-right { fill: #E1F5EE; }
      .bg-full  { fill: #F7F5EE; }
      .grid-line { stroke: #E8D9B8; stroke-width: 0.8; }
      .unit-edge-old { stroke: #BA7517; stroke-width: 1.6; }
      .unit-edge-new { stroke: #0F6E56; stroke-width: 1.6; }
      .unit-edge-new-dim { stroke: #0F6E56; stroke-width: 1.0; opacity: 0.4; }
      .dot-old { fill: #BA7517; }
      .dot-new { fill: #0F6E56; }
      .badge-old-bg   { fill: #FAEEDA; stroke: #BA7517; stroke-width: 1.2; }
      .badge-new-bg   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1.2; }
      .badge-old-text { fill: #633806; font-family: Georgia, serif; font-size: 22px; }
      .badge-new-text { fill: #085041; font-family: Georgia, serif; font-size: 22px; }
      .divider  { stroke: #B4B2A9; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .caption  { fill: #888780; font-family: Georgia, serif; font-size: 19px; }
      .heading  { fill: #2C2C2A; font-family: Georgia, serif; font-size: 28px; font-weight: normal; letter-spacing: 0.02em; }
    </style>
  </defs>

  <!-- Full background -->
  <rect width="1200" height="630" fill="#F7F5EE"/>

  <!-- Left panel tint -->
  <rect x="0" y="0" width="594" height="630" fill="#FFFBF2"/>
  <!-- Right panel tint -->
  <rect x="606" y="0" width="594" height="630" fill="#F0FAF5"/>

  <!-- ── LEFT PANEL: Square grid ── -->
  <!-- Grid guide lines (very faint) -->
  <line x1="80"  y1="100" x2="80"  y2="530" class="grid-line"/>
  <line x1="176" y1="100" x2="176" y2="530" class="grid-line"/>
  <line x1="272" y1="100" x2="272" y2="530" class="grid-line"/>
  <line x1="368" y1="100" x2="368" y2="530" class="grid-line"/>
  <line x1="464" y1="100" x2="464" y2="530" class="grid-line"/>
  <line x1="60"  y1="120" x2="530" y2="120" class="grid-line"/>
  <line x1="60"  y1="216" x2="530" y2="216" class="grid-line"/>
  <line x1="60"  y1="312" x2="530" y2="312" class="grid-line"/>
  <line x1="60"  y1="408" x2="530" y2="408" class="grid-line"/>
  <line x1="60"  y1="504" x2="530" y2="504" class="grid-line"/>

  <!-- Horizontal unit edges -->
  <line x1="80" y1="120" x2="176" y2="120" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="120" x2="272" y2="120" class="unit-edge-old" opacity="0.8"/>
  <line x1="272" y1="120" x2="368" y2="120" class="unit-edge-old" opacity="0.8"/>
  <line x1="368" y1="120" x2="464" y2="120" class="unit-edge-old" opacity="0.8"/>
  <line x1="80" y1="216" x2="176" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="216" x2="272" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="272" y1="216" x2="368" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="368" y1="216" x2="464" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="80" y1="312" x2="176" y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="312" x2="272" y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="272" y1="312" x2="368" y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="368" y1="312" x2="464" y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="80" y1="408" x2="176" y2="408" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="408" x2="272" y2="408" class="unit-edge-old" opacity="0.8"/>
