  <line x1="784" y1="223" x2="832" y2="306" class="unit-edge-new" opacity="0.85"/>
  <line x1="880" y1="223" x2="832" y2="306" class="unit-edge-new" opacity="0.85"/>
  <line x1="880" y1="223" x2="928" y2="306" class="unit-edge-new" opacity="0.85"/>
  <line x1="976" y1="223" x2="928" y2="306" class="unit-edge-new" opacity="0.85"/>
