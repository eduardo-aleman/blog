  <circle cx="368" cy="408" r="7" class="dot-old"/>
  <circle cx="464" cy="408" r="7" class="dot-old"/>
  <circle cx="80"  cy="504" r="7" class="dot-old"/>
  <circle cx="176" cy="504" r="7" class="dot-old"/>
  <circle cx="272" cy="504" r="7" class="dot-old"/>
  <circle cx="368" cy="504" r="7" class="dot-old"/>
  <circle cx="464" cy="504" r="7" class="dot-old"/>

  <!-- Left badge -->
