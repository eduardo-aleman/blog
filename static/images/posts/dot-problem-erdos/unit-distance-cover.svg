  <line x1="80"  y1="216" x2="80"  y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="80"  y1="312" x2="80"  y2="408" class="unit-edge-old" opacity="0.8"/>
  <line x1="80"  y1="408" x2="80"  y2="504" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="120" x2="176" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="216" x2="176" y2="312" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="312" x2="176" y2="408" class="unit-edge-old" opacity="0.8"/>
  <line x1="176" y1="408" x2="176" y2="504" class="unit-edge-old" opacity="0.8"/>
  <line x1="272" y1="120" x2="272" y2="216" class="unit-edge-old" opacity="0.8"/>
  <line x1="272" y1="216" x2="272" y2="312" class="unit-edge-old" opacity="0.8"/>
