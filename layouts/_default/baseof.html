<!DOCTYPE html>
<html lang="{{ .Lang }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>
    {{- if .IsHome -}}
      {{ .Site.Title }}
    {{- else -}}
      {{ .Title }} – {{ .Site.Title }}
    {{- end -}}
  </title>
  
  <meta name="description" content="{{ .Description | default .Summary }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta name="theme-color" content="#faf7f2">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title | default .Site.Title }}">
  <meta property="og:description" content="{{ .Description | default .Summary }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  {{- if .Params.image }}
  <meta property="og:image" content="{{ .Params.image | absURL }}">
  {{- end }}
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title | default .Site.Title }}">
  <meta name="twitter:description" content="{{ .Description | default .Summary }}">
  {{- if .Params.image }}
  <meta name="twitter:image" content="{{ .Params.image | absURL }}">
  {{- end }}
  
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ .Permalink }}">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  
  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}{{ .Lang }}/index.xml">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  
  <!-- Dark mode script (no FOUC) -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme-preference');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body id="top">
  <!-- Skip to main content link -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Header -->
  {{ partial "header.html" . }}
  
  <!-- Main content -->
  <main id="main-content">
    <!-- Back-to-top rail: zero-height sticky anchor that pins the arrow
         to the bottom-right of the viewport while main is in view -->
    <div class="back-to-top-rail">
      <a href="#top" class="back-to-top" aria-label="Back to top">↑</a>
    </div>

    {{ block "main" . }}{{ end }}
  </main>
  
  <!-- Footer -->
  {{ partial "footer.html" . }}
  
  <!-- Scripts -->
  <script src="/js/theme-toggle.js"></script>
  <script src="/js/back-to-top.js" defer></script>
</body>
</html>
