<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <!-- Navigation Section -->
      <div class="footer-section">
        <h4 class="footer-section__title">
          {{ i18n "navigation" | default "Navigation" }}
        </h4>
        <ul class="footer-section__list">
          {{ range .Site.Menus.main }}
            <li>
              <a href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
          <li>
            <a href="{{ .Site.BaseURL }}{{ .Lang }}/index.xml">RSS Feed</a>
          </li>
        </ul>
      </div>
    </div>
    
    <!-- Footer Bottom -->
    <div class="footer-bottom">
      <p class="footer-bottom__credit">
        {{ now.Year }}  Eduardo Alemán  No Copyright
      </p>
    </div>
  </div>
</footer>
