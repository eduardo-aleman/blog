{{ define "main" }}
<article class="page-grid">
  <header class="section">
    <h1>{{ .Title }}</h1>
  </header>

  <div class="section prose navigation-list">
    {{ $allPages := .Site.RegularPages }}
    {{ $pages := where $allPages "Kind" "page" }}
    
    {{ if gt (len $pages) 0 }}
      {{ range sort $pages "Date" "desc" }}
        <div class="navigation-item">
          <a href="{{ .Permalink }}">{{ .Title }}</a>
          <span class="navigation-date">{{ .Date.Format "January 2, 2006" }}</span>
        </div>
      {{ end }}
    {{ end }}
  </div>
</article>
{{ end }}
